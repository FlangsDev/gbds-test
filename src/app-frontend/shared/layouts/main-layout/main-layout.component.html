<div class="layout-wrapper" [class.collapsed]="isSidebarCollapsed">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo" (click)="isSidebarCollapsed = false">
        <img src="assets/logos/logo2.png" alt="GBDPS Logo">
        <span>GBDPS-APP</span>
      </div>
      <button class="toggle-btn" (click)="toggleSidebar()">
        <i class="fa-solid fa-bars"></i>
      </button>
    </div>

    <nav class="sidebar-nav">
      <p class="nav-label">NAVIGATION</p>
      <ul>
        <li *ngFor="let item of menuItems" class="nav-item">
          <div class="menu-link" [routerLink]="item.route" routerLinkActive="active" *ngIf="!item.children" (click)="activeMenu = item.label">
            <i [class]="item.icon"></i>
            <span>{{item.label}}</span>
          </div>

          <div class="menu-group" *ngIf="item.children">
            <div class="menu-link group-header" (click)="toggleSubMenu(item)">
              <i [class]="item.icon"></i>
              <span>{{item.label}}</span>
              <i class="fa-solid fa-angle-down arrow" [class.rotated]="item.isExpanded"></i>
            </div>
            <ul class="submenu" [class.expanded]="item.isExpanded">
              <li *ngFor="let child of item.children">
                <a [routerLink]="child.route" routerLinkActive="active" (click)="activeMenu = child.label">
                  <i class="submenu-icon" [class]="child.icon" *ngIf="child.icon"></i>
                  {{child.label}}
                </a>
              </li>
            </ul>
          </div>
        </li>
      </ul>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn">
        <i class="fa-solid fa-arrow-right-from-bracket"></i>
        <span>Logout</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-container">
    <header class="top-header">
      <h1 class="page-title">{{activeMenu}}</h1>
      <div class="header-right">
        <div class="timer">
          <i class="fa-regular fa-clock"></i>
          <div class="time-box">
            <span class="time">{{currentTime}}</span>
            <span class="date">{{currentDate}}</span>
          </div>
        </div>
        <div class="guidance-wrapper">
          <button class="info-btn" (click)="toggleGuidance()"><i class="fa-solid fa-info-circle"></i></button>
          
          <div class="guidance-dropdown" *ngIf="isGuidanceOpen">
            <div class="guidance-header">
              <i class="fa-solid fa-info-circle"></i> Guidance
            </div>
            <ul class="guidance-list">
              <li>Overview</li>
              <li>Flow Procces</li>
              <li>Tutorial</li>
            </ul>
          </div>
        </div>
        <div class="user-profile-wrapper" (click)="toggleProfile()">
          <div class="user-profile">
            <div class="avatar">
              <i class="fa-solid fa-user"></i>
            </div>
            <span class="user-name">Admin</span>
            <i class="fa-solid fa-angle-down" [class.rotated]="isProfileOpen" style="transition: transform 0.2s"></i>
          </div>
          
          <div class="profile-dropdown" *ngIf="isProfileOpen">
            <div class="profile-info-grid">
              <div class="info-row">
                <span class="info-label">Nama</span>
                <span class="info-value">Admin</span>
              </div>
              <div class="info-row">
                <span class="info-label">Role Access</span>
                <span class="info-value">Administrator</span>
              </div>
              <div class="info-row">
                <span class="info-label">Unit kerja</span>
                <span class="info-value">Gudang Berikat</span>
              </div>
            </div>
            <ul>
              <li class="logout-text"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</li>
            </ul>
          </div>
        </div>
      </div>
    </header>

    <section class="content-area">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
