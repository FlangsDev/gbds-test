<div class="form-card">
  <div class="form-header">
    <h2>Upload Data BC</h2>
    <p>Unggah file Data BC (Excel/CSV) untuk masuk ke Pemasukan/Pengeluaran</p>
  </div>

  <div class="upload-container">
    <div class="note-box mb-24">
      <i class="fa-solid fa-circle-info"></i>
      <span><strong>Catatan:</strong> Pastikan file excel yang diunggah berasal dari sistem <strong>CEISA</strong>.</span>
    </div>

    <div class="form-group">
      <label>File Data BC</label>
      <div class="dropzone" 
           [class.active]="isDragging"
           (dragover)="onDragOver($event)"
           (dragleave)="onDragLeave()"
           (drop)="onDrop($event)">
        <div class="drop-icon">
          <i class="fa-solid fa-cloud-arrow-up"></i>
        </div>
        <h3>Drag & drop file disini</h3>
        <p>atau klik untuk memilih file</p>
        <span class="file-hint">Format: Excel, CSV (Maks. 50MB)</span>
      </div>
    </div>

    <div class="form-actions mt-32">
      <button class="btn-delete">Hapus</button>
      <button class="btn-upload" (click)="onUpload()">
        <i class="fa-solid fa-upload"></i>
        Upload Data BC
      </button>
    </div>
  </div>
</div>
