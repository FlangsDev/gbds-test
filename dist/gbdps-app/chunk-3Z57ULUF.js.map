<div class="feedback-container">
  <h2><i class="fa-regular fa-comment-dots" style="color:var(--primary-color);"></i> Kirim Feedback</h2>
  <p style="color:var(--text-muted); margin-bottom: 20px;">Beritahu kami apa yang bisa ditingkatkan atau laporkan masalah yang Anda alami.</p>
  
  <div style="display:flex; flex-direction:column; gap:16px; max-width: 600px;">
    <div>
      <label style="display:block; font-weight:600; font-size:0.9rem; margin-bottom:8px;">Kategori <span style="color:#ef4444">*</span></label>
      
      <!-- Custom Dropdown container -->
      <div style="position: relative;">
        <div class="custom-select-trigger" [class.open]="isDropdownOpen" (click)="toggleDropdown()">
          <span>{{ selectedCategory }}</span>
          <i class="fa-solid fa-angle-down" style="color:var(--text-muted);"></i>
        </div>
        
        <div class="dropdown-menu" *ngIf="isDropdownOpen">
          <ul>
            <li *ngFor="let cat of categories" (click)="selectCategory(cat)" [class.active-opt]="cat === selectedCategory">
              {{ cat }}
            </li>
          </ul>
        </div>
      </div>
    </div>
    
    <div>
      <label style="display:block; font-weight:600; font-size:0.9rem; margin-bottom:8px;">Pesan <span style="color:#ef4444">*</span></label>
      <textarea rows="5" placeholder="Tuliskan feedback Anda di sini..." style="width:100%; padding:10px 14px; border:1px solid var(--border-color); border-radius:8px; font-family:inherit; resize:vertical; font-size:0.9rem; color:var(--text-main);"></textarea>
    </div>
    
    <button style="align-self:flex-start; background:var(--primary-color); color:#fff; border:none; padding:10px 24px; border-radius:8px; font-weight:600; cursor:pointer;"><i class="fa-solid fa-paper-plane"></i> Kirim Feedback</button>
  </div>
</div>
